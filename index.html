<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E0E0D">
<meta name="mobile-web-app-capable" content="yes">
<title>Rotina</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◉</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230E0E0D' width='100' height='100' rx='20'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%234ADE80'>◉</text></svg>">
<link rel="manifest" href="data:application/json,{%22name%22:%22Rotina%22,%22short_name%22:%22Rotina%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230E0E0D%22,%22theme_color%22:%22%230E0E0D%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect fill='%230E0E0D' width='512' height='512' rx='100'/><text x='256' y='350' font-size='280' text-anchor='middle' fill='%234ADE80'>◉</text></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any maskable%22}]}">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0E0D;--s1:#161615;--s2:#1D1D1C;--s3:#252524;
  --b1:#2A2A28;--b2:#353533;
  --t1:#E8E8E3;--t2:#8A8A82;--t3:#555550;
  --g:#4ADE80;--gd:#142e1d;--r:#F87171;--rd:#2d1516;--o:#FBBF24;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;--rad:8px;
}
html{font-size:15px}body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer}input,select{font-family:var(--font)}
.app{max-width:560px;margin:0 auto;padding:16px 16px 100px}

/* header */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 0 16px}
.hdr h1{font-family:var(--mono);font-size:1.05rem;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-family:var(--mono);font-size:.64rem;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.hdr-r{display:flex;gap:5px}
.btn-s{height:32px;padding:0 10px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s1);color:var(--t2);font-size:.7rem;font-weight:600;display:flex;align-items:center;gap:4px;transition:all .12s}
.btn-s:hover{border-color:var(--t3);color:var(--t1)}
.btn-g{background:var(--g);color:#111;border-color:var(--g)}.btn-g:hover{opacity:.85;border-color:var(--g)}

/* tabs */
.tabs{display:flex;gap:2px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:3px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;padding:7px 10px;border:none;background:0;border-radius:6px;font-family:var(--mono);font-weight:600;font-size:.66rem;color:var(--t3);transition:all .12s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tab.on{background:var(--s2);color:var(--t1)}

/* inbox */
.inbox-input{display:flex;gap:6px;margin-bottom:14px}
.inbox-input .fi{flex:1}
.inbox-add{width:40px;height:40px;border-radius:var(--rad);border:1px solid var(--g);background:var(--gd);color:var(--g);font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;flex-shrink:0}
.inbox-add:hover{background:var(--g);color:#111}
.todo-it{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:4px;transition:all .12s}
.todo-it.todo-dn{opacity:.35}
.todo-it.todo-dn .todo-text{text-decoration:line-through}
.todo-text{flex:1;font-size:.84rem;font-weight:500;line-height:1.4;min-width:0}
.todo-due{font-family:var(--mono);font-size:.55rem;color:var(--t3);margin-top:3px}
.todo-due.overdue{color:var(--r)}
.todo-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:3px}
.clear-done{font-family:var(--mono);font-size:.6rem;color:var(--t3);background:0;border:1px solid var(--b1);border-radius:var(--rad);padding:5px 10px;cursor:pointer;transition:all .1s;margin-top:8px}
.clear-done:hover{border-color:var(--r);color:var(--r)}

/* progress */
.prog-wrap{margin-bottom:14px}
.prog-bar{height:4px;background:var(--s2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--g);border-radius:2px;transition:width .3s}
.prog-lbl{font-family:var(--mono);font-size:.58rem;color:var(--t3);margin-top:4px;text-align:right}

/* milestone popup */
.milestone-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;pointer-events:none;animation:fi .2s}
.milestone-card{background:var(--s1);border:2px solid var(--g);border-radius:16px;padding:28px 32px;text-align:center;pointer-events:auto;animation:ms-pop .4s cubic-bezier(.17,.67,.35,1.3)}
@keyframes ms-pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.ms-icon{font-size:3rem;margin-bottom:8px}
.ms-title{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--g);margin-bottom:4px}
.ms-sub{font-size:.8rem;color:var(--t2);margin-bottom:16px}
.ms-name{font-weight:600;color:var(--t1)}
.ms-dismiss{background:var(--g);color:#111;border:none;border-radius:var(--rad);padding:8px 20px;font-family:var(--font);font-weight:600;font-size:.8rem;cursor:pointer}

/* tags */
.tbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.tch{font-family:var(--mono);font-size:.6rem;padding:3px 9px;border-radius:16px;border:1px solid var(--b1);background:0;cursor:pointer;transition:all .12s}
.tch.on{border-color:var(--g);color:var(--g);background:var(--gd)}

/* items */
.slbl{font-family:var(--mono);font-size:.58rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:14px 0 8px}
.it{display:flex;align-items:center;gap:11px;padding:11px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:4px;transition:all .15s}
.it.dn{opacity:.35}
.ck{width:22px;height:22px;border-radius:50%;border:2px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0}
.ck:hover{border-color:var(--g)}.it.dn .ck{background:var(--g);border-color:var(--g)}
.ck svg{opacity:0}.it.dn .ck svg{opacity:1}
.ii{flex:1;min-width:0}.iname{font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:6px}
.itime{font-family:var(--mono);font-size:.6rem;color:var(--t3);font-weight:500}
.im{font-family:var(--mono);font-size:.58rem;color:var(--t3);margin-top:2px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.itag{font-size:.55rem;padding:1px 6px;border-radius:3px;font-weight:600;letter-spacing:.3px}
.sk{font-family:var(--mono);font-size:.64rem;font-weight:600;color:var(--o);white-space:nowrap}
.be{width:26px;height:26px;border:none;background:0;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .1s;flex-shrink:0}
.be:hover{background:var(--s2);color:var(--t2)}
.empty{text-align:center;padding:50px 20px;color:var(--t3)}.empty p{font-size:.84rem;margin-bottom:14px}

/* mini strip in today view */
.mini-strip{display:flex;gap:2px;margin-top:5px}
.ms-cell{width:14px;height:14px;min-width:14px;border-radius:3px;background:var(--s3);cursor:pointer;transition:all .1s}
.ms-cell:hover{outline:1px solid var(--t3);outline-offset:1px}
.ms-cell.ms-on{background:var(--g)}
.ms-cell.ms-skip{background:var(--o);opacity:.5}
.ms-cell.ms-na{background:transparent;cursor:default}
.ms-lbl{font-family:var(--mono);font-size:.45rem;color:var(--t3);text-align:center;margin-top:1px}
.ms-wrap{display:flex;gap:2px}
.ms-day{display:flex;flex-direction:column;align-items:center}
.skip-btn{font-family:var(--mono);font-size:.55rem;color:var(--t3);background:0;border:1px solid var(--b1);border-radius:4px;padding:1px 5px;cursor:pointer;transition:all .1s;margin-left:4px}
.skip-btn:hover{border-color:var(--o);color:var(--o)}
.skip-btn.on{background:var(--o);color:#111;border-color:var(--o)}
.rate-pct{font-family:var(--mono);font-size:.55rem;color:var(--t3);margin-left:auto;white-space:nowrap}

/* period */
.period-bar{display:flex;gap:4px;margin-bottom:12px}
.period-chip{font-family:var(--mono);font-size:.6rem;padding:4px 10px;border-radius:16px;border:1px solid var(--b1);background:0;color:var(--t3);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:3px}
.period-chip.on{border-color:var(--g);color:var(--g);background:var(--gd)}
.period-icon{font-size:.7rem}
.period-badge{font-size:.6rem;margin-right:2px}

/* git heatmap */
.hw{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:16px;overflow-x:auto;margin-bottom:12px}

/* week view */
.wk-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.wk-nav-lbl{font-family:var(--mono);font-size:.72rem;font-weight:600;text-transform:capitalize}
.wk-nav-btn{width:32px;height:32px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .1s}
.wk-nav-btn:hover{border-color:var(--t3);color:var(--t1)}
.wk-grid{display:grid;grid-template-columns:minmax(100px,1fr) repeat(7,1fr);gap:1px;background:var(--b1);border-radius:var(--rad);overflow:hidden;border:1px solid var(--b1)}
.wk-hdr{background:var(--s2);padding:8px 4px;text-align:center;font-family:var(--mono);font-size:.58rem;font-weight:600;color:var(--t3);text-transform:uppercase}
.wk-hdr.wk-today{color:var(--g)}
.wk-name{background:var(--s1);padding:8px 10px;font-size:.76rem;font-weight:600;display:flex;align-items:center;min-height:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wk-cell{background:var(--s1);display:flex;align-items:center;justify-content:center;min-height:40px;cursor:pointer;transition:background .1s}
.wk-cell:hover{background:var(--s2)}
.wk-cell.wk-na{cursor:default;opacity:.2}
.wk-cell.wk-na:hover{background:var(--s1)}
.wk-dot{width:18px;height:18px;border-radius:50%;background:var(--s3);transition:all .12s}
.wk-cell.wk-done .wk-dot{background:var(--g)}
.wk-cell.wk-skip .wk-dot{background:var(--o);opacity:.5}
.wk-corner{background:var(--s2);padding:8px;font-family:var(--mono);font-size:.55rem;color:var(--t3)}

/* month view */
.mo-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:14px;margin-bottom:8px}
.loop-hdr{display:flex;justify-content:space-between;align-items:center}
.loop-name{font-weight:600;font-size:.84rem}
.mo-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mo-cal-hdr{text-align:center;font-family:var(--mono);font-size:.5rem;font-weight:600;color:var(--t3);padding:2px 0}
.mo-cal-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 0;border-radius:4px;cursor:pointer;transition:all .1s;min-height:32px;gap:2px}
.mo-cal-cell:hover{background:var(--s2)}
.mo-cal-cell.mo-empty{cursor:default}.mo-cal-cell.mo-empty:hover{background:transparent}
.mo-cal-cell.mo-na{cursor:default;opacity:.25}.mo-cal-cell.mo-na:hover{background:transparent}
.mo-num{font-family:var(--mono);font-size:.5rem;color:var(--t3);font-weight:500;line-height:1}
.mo-cdot{width:12px;height:12px;border-radius:50%;background:var(--s3);transition:all .12s}
.mo-cal-cell.mo-done .mo-cdot{background:var(--g)}
.mo-cal-cell.mo-skip .mo-cdot{background:var(--o);opacity:.5}
.mo-cal-cell.mo-today{outline:1px solid var(--g);outline-offset:-1px}
.mo-cal-cell.mo-today .mo-num{color:var(--g)}

/* best day stats */
.bd-wrap{display:flex;gap:4px;margin-top:14px}
.bd-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bd-bar-track{width:100%;height:60px;background:var(--s2);border-radius:4px;position:relative;overflow:hidden}
.bd-bar-fill{position:absolute;bottom:0;width:100%;border-radius:4px;transition:height .3s}
.bd-bar-lbl{font-family:var(--mono);font-size:.55rem;color:var(--t3);font-weight:600}
.bd-bar-pct{font-family:var(--mono);font-size:.5rem;color:var(--t2);font-weight:600}

/* confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;opacity:0;animation:confetti-fall 1s ease-out forwards}
@keyframes confetti-fall{
  0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translate(var(--cx),var(--cy)) rotate(var(--cr)) scale(0)}
}
.ht-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ht{font-family:var(--mono);font-size:.7rem;font-weight:600;color:var(--t2)}
.hm-select{font-family:var(--mono);font-size:.65rem;background:var(--s2);color:var(--t1);border:1px solid var(--b1);border-radius:5px;padding:4px 8px;outline:0;cursor:pointer;max-width:180px}
.hm{display:flex;gap:3px}.hc{display:flex;flex-direction:column;gap:3px}
.hx{width:13px;height:13px;border-radius:3px;background:var(--s2);transition:all .1s;position:relative}
.hx[data-r="1"]{background:#152e1d}.hx[data-r="2"]{background:#1a5c30}.hx[data-r="3"]{background:#27864a}.hx[data-r="4"]{background:#4ADE80}
.hl{display:flex;gap:4px;align-items:center;justify-content:flex-end;margin-top:10px;font-family:var(--mono);font-size:.55rem;color:var(--t3)}
.hlc{width:11px;height:11px;border-radius:2px}

/* archive badge */
.arch-badge{font-family:var(--mono);font-size:.55rem;padding:2px 6px;border-radius:4px;background:var(--s3);color:var(--t3)}

/* streaks */
.sr{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:4px}
.srn{font-weight:600;font-size:.8rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srv{font-family:var(--mono);font-size:.8rem;font-weight:700;color:var(--g);min-width:50px;text-align:right}
.srb{font-family:var(--mono);font-size:.62rem;color:var(--t3);min-width:60px;text-align:right}

/* drag reorder */
.drag-handle{cursor:grab;color:var(--t3);display:flex;align-items:center;justify-content:center;padding:4px 2px;flex-shrink:0;touch-action:none;-webkit-user-select:none;user-select:none}
.drag-handle:active{cursor:grabbing}
.drag-handle svg{pointer-events:none}
.it.dragging{opacity:.3;background:var(--s2)}
.it.drag-over{border-top:2px solid var(--g);margin-top:-2px}

/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fi .1s}
@media(min-width:500px){.ov{align-items:center}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo{background:var(--s1);border:1px solid var(--b1);border-radius:14px 14px 0 0;padding:22px 18px 26px;width:100%;max-width:420px;animation:su .12s;max-height:90dvh;overflow-y:auto}
@media(min-width:500px){.mo{border-radius:10px}}
.mo h3{font-size:.92rem;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:14px}
.fl{font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:5px;display:block}
.fi{width:100%;padding:9px 11px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s2);color:var(--t1);font-size:.84rem;outline:0;transition:border-color .12s}
.fi:focus{border-color:var(--g)}
.fi-row{display:flex;gap:8px}
.fi-row .fi{flex:1}
.fi-time{width:90px;font-family:var(--mono);text-align:center}
.fo{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:6px 11px;border-radius:var(--rad);border:1px solid var(--b1);background:0;font-size:.73rem;font-weight:500;cursor:pointer;transition:all .1s;color:var(--t2)}
.fb.on{border-color:var(--g);color:var(--g);background:var(--gd)}
.dp{display:flex;gap:4px;margin-top:8px}
.db{width:32px;height:32px;border-radius:50%;border:1px solid var(--b1);background:0;font-family:var(--mono);font-size:.64rem;font-weight:600;cursor:pointer;transition:all .1s;color:var(--t3)}
.db.on{border-color:var(--g);color:var(--g);background:var(--gd)}
.mdi{width:56px;padding:7px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s2);font-family:var(--mono);font-size:.84rem;color:var(--t1);text-align:center;outline:0;margin-top:8px}
.mdi:focus{border-color:var(--g)}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:var(--rad);border:none;font-weight:600;font-size:.76rem;cursor:pointer;transition:all .1s}
.bp{background:var(--g);color:#111}.bp:hover{opacity:.85}
.bs{background:0;border:1px solid var(--b1);color:var(--t2)}.bs:hover{border-color:var(--t3)}
.bd{background:var(--rd);color:var(--r)}.bd:hover{opacity:.85}

/* tag input area */
.tag-input-wrap{position:relative}
.tag-suggestions{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag-sug{font-family:var(--mono);font-size:.58rem;padding:3px 8px;border-radius:12px;cursor:pointer;border:1px solid var(--b1);transition:all .1s}
.tag-sug:hover{border-color:var(--t3)}
.tag-color-row{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag-color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s}
.tag-color-dot:hover,.tag-color-dot.on{border-color:var(--t1);transform:scale(1.15)}

/* tag pills in modal */
.tag-selected{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag-pill{font-family:var(--mono);font-size:.6rem;font-weight:600;padding:4px 6px 4px 9px;border-radius:6px;border:1px solid;display:inline-flex;align-items:center;gap:5px}
.tag-x{cursor:pointer;font-size:.8rem;opacity:.6;transition:opacity .1s;line-height:1}
.tag-x:hover{opacity:1}
.tag-cdot{width:12px;height:12px;border-radius:50%;cursor:pointer;opacity:.8;transition:all .1s;flex-shrink:0}
.tag-cdot:hover{opacity:1;transform:scale(1.2)}

/* reminder toggle */
.rem-row{display:flex;align-items:center;gap:8px}
.rem-toggle{width:36px;height:20px;border-radius:10px;background:var(--b1);border:none;cursor:pointer;position:relative;transition:background .15s}
.rem-toggle.on{background:var(--g)}
.rem-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .15s}
.rem-toggle.on::after{transform:translateX(16px)}

@media(max-width:380px){.db{width:28px;height:28px;font-size:.58rem}.hx{width:11px;height:11px}}

/* lock screen */
.lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px}
.lock h1{font-family:var(--mono);font-size:1.6rem;font-weight:700;margin-bottom:6px}
.lock p{color:var(--t3);font-size:.82rem;margin-bottom:28px}
.lock-dots{display:flex;gap:12px;margin-bottom:24px}
.lock-dot{width:14px;height:14px;border-radius:50%;background:var(--s3);transition:all .2s}
.lock-dot.filled{background:var(--g)}
.lock-dot.wrong{background:var(--r);animation:shake .3s}
.lock-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px}
.lock-key{width:68px;height:68px;border-radius:50%;border:1px solid var(--b1);background:var(--s1);color:var(--t1);font-family:var(--mono);font-size:1.2rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.lock-key:hover{background:var(--s2)}.lock-key:active{background:var(--s3);transform:scale(.95)}
.lock-key.empty{border:none;background:none;cursor:default}
.lock-key.empty:hover{background:none}
.lock-sub{font-family:var(--mono);font-size:.58rem;color:var(--t3);margin-top:20px;cursor:pointer;background:0;border:0;padding:4px 8px}
.lock-sub:hover{color:var(--t2)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════
// CONFIG & CONSTANTS
// ═══════════════════════════════════════════════════════════
const FB_CONFIG={apiKey:"AIzaSyBIL-pvTf4fvE-NuquiVXqkcedbXYssDL0",authDomain:"rotinavini.firebaseapp.com",databaseURL:"https://rotinavini-default-rtdb.firebaseio.com",projectId:"rotinavini",storageBucket:"rotinavini.firebasestorage.app",messagingSenderId:"926063710082",appId:"1:926063710082:web:892c51fef8d8c09c15099b"};
const LK='rotina_v3';
const DL=['D','S','T','Q','Q','S','S'];
const DN=['dom','seg','ter','qua','qui','sex','sáb'];
const MN=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const TAG_COLORS=['#4ADE80','#60A5FA','#FBBF24','#F87171','#C084FC','#F472B6','#FB923C','#2DD4BF','#A78BFA','#FCD34D'];

let dbRef=null,fbOk=false;

// ═══════════════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════════════
function initFB(){
  if(typeof firebase==='undefined')return;
  try{
    firebase.initializeApp(FB_CONFIG);
    dbRef=firebase.database().ref('rotina');fbOk=true;
    dbRef.on('value',snap=>{
      const d=snap.val();
      if(d){
        if(d.items) S.data.items=d.items.map(i=>({...i,checks:i.checks||[]}));
        if(d.tagColors) S.data.tagColors=d.tagColors;
        if(d.todos) S.data.todos=d.todos;
        if(d.milestones) S.data.milestones=d.milestones;
        setL(S.data);R();
      }
    });
  }catch(e){console.error('Firebase:',e)}
}

function push(d){
  setL(d);
  if(fbOk&&dbRef){
    const clean=JSON.parse(JSON.stringify(d));
    // Remove undefined values (Firebase doesn't like them)
    clean.items=(clean.items||[]).map(i=>{
      const o={...i};Object.keys(o).forEach(k=>{if(o[k]===undefined||o[k]===null)delete o[k]});return o;
    });
    dbRef.set(clean).catch(console.error);
  }
}

// ═══════════════════════════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════════════════════════
const getL=()=>{try{const d=JSON.parse(localStorage.getItem(LK));return d&&d.items?{...d,todos:d.todos||[]}:{items:[],tagColors:{},todos:[]}}catch{return{items:[],tagColors:{},todos:[]}}};
const setL=d=>localStorage.setItem(LK,JSON.stringify(d));

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const td=()=>{const d=new Date();return $d(d.getFullYear(),d.getMonth(),d.getDate())};
const $d=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};

function isDue(it,dt){
  const d=new Date(dt+'T12:00:00');
  if(it.freq==='daily')return true;
  if(it.freq==='weekly')return it.days?.includes(d.getDay());
  if(it.freq==='monthly')return it.monthDay===d.getDate();
  return false;
}

function streak(it){
  if(!it.checks?.length)return 0;
  const t=td();let cur=t;
  if(isDue(it,t)&&!it.checks.includes(t)&&!it.skips?.includes(t)){
    const y=new Date();y.setDate(y.getDate()-1);cur=$d(y.getFullYear(),y.getMonth(),y.getDate());
  }
  let s=0;
  for(let i=0;i<730;i++){
    const x=new Date(cur+'T12:00:00');x.setDate(x.getDate()-i);
    const d=$d(x.getFullYear(),x.getMonth(),x.getDate());
    if(!isDue(it,d))continue;
    if(it.skips?.includes(d))continue; // skip doesn't break streak
    if(it.checks.includes(d))s++;else break;
  }
  return s;
}

function bestStreak(it){
  if(!it.checks?.length)return 0;
  const sorted=[...it.checks].sort();let b=1,c=1;
  for(let i=1;i<sorted.length;i++){
    let miss=false;
    const a=new Date(sorted[i-1]+'T12:00:00'),z=new Date(sorted[i]+'T12:00:00'),t=new Date(a);
    t.setDate(t.getDate()+1);
    while(t<z){
      const d=$d(t.getFullYear(),t.getMonth(),t.getDate());
      if(isDue(it,d)&&!it.skips?.includes(d)){miss=true;break}
      t.setDate(t.getDate()+1);
    }
    if(!miss)c++;else c=1;if(c>b)b=c;
  }
  return b;
}

const schedLbl=it=>it.freq==='daily'?'todo dia':it.freq==='weekly'?(it.days||[]).map(d=>DN[d]).join(', '):`dia ${it.monthDay}/mês`;

function sortedItems(items){
  return[...items].sort((a,b)=>{
    const oa=(a.order??999)-(b.order??999);if(oa!==0)return oa;
    const ta=(a.time||'99:99'),tb=(b.time||'99:99');if(ta!==tb)return ta.localeCompare(tb);
    return(a.created||'').localeCompare(b.created||'');
  });
}

function allTags(items){const s=new Set();items.forEach(i=>(i.tags||[]).forEach(t=>s.add(t)));return[...s].sort()}

function getTagColor(tag){
  const tc=S.data.tagColors||{};
  if(tc[tag])return tc[tag];
  const used=new Set(Object.values(tc));
  const color=TAG_COLORS.find(c=>!used.has(c))||TAG_COLORS[Math.abs(tag.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%TAG_COLORS.length];
  if(!S.data.tagColors)S.data.tagColors={};
  S.data.tagColors[tag]=color;
  return color;
}

function tagHTML(tag){
  const c=getTagColor(tag);
  return`<span class="itag" style="background:${c}22;color:${c}">${esc(tag)}</span>`;
}

// ═══════════════════════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════════════════════
function csv(){
  const its=S.data.items||[];let rows=['date,item,tags,schedule,completed'];
  const dates=new Set();its.forEach(i=>(i.checks||[]).forEach(c=>dates.add(c)));
  const now=new Date();for(let i=0;i<365;i++){const d=new Date(now);d.setDate(d.getDate()-i);dates.add($d(d.getFullYear(),d.getMonth(),d.getDate()))}
  [...dates].sort().forEach(dt=>{its.forEach(it=>{if(!isDue(it,dt))return;rows.push([dt,`"${it.name}"`,`"${(it.tags||[]).join(';')}"`,`"${schedLbl(it)}"`,it.checks?.includes(dt)?'yes':'no'].join(','))})});
  const b=new Blob([rows.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='rotina.csv';a.click();
}

function exportJSON(){
  const d=JSON.stringify(S.data,null,2);
  const b=new Blob([d],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`rotina_backup_${td()}.json`;a.click();
}

function importJSON(input){
  const file=input.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!d.items){alert('Arquivo inválido — não encontrei dados de rotina.');return}
      if(!confirm(`Restaurar backup? Isso vai substituir todos os dados atuais.\n\n${d.items.length} hábitos, ${(d.todos||[]).length} tarefas encontrados.`))return;
      S.data=d;
      if(!S.data.tagColors)S.data.tagColors={};
      if(!S.data.todos)S.data.todos=[];
      push(S.data);R();
    }catch{alert('Erro ao ler o arquivo. Verifique se é um JSON válido.')}
  };
  reader.readAsText(file);
  input.value='';
}

window.exportJSON=exportJSON;
window.importJSON=importJSON;

// ═══════════════════════════════════════════════════════════
// REMINDERS
// ═══════════════════════════════════════════════════════════
let lastReminded={};
function checkReminders(){
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  const now=new Date();
  const hhmm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const t=td();
  (S.data.items||[]).forEach(it=>{
    if(!it.time||!it.reminder)return;
    if(it.time!==hhmm)return;
    if(!isDue(it,t)||it.checks?.includes(t))return;
    const key=it.id+t+hhmm;
    if(lastReminded[key])return;
    lastReminded[key]=true;
    new Notification('◉ Rotina',{body:it.name,tag:it.id});
  });
}
setInterval(checkReminders,30000);

function requestNotifPerm(){
  if('Notification'in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let S={data:{items:[],tagColors:{},todos:[]},view:'today',modal:null,edit:null,tagF:null,periodF:null,heatItem:'all',weekOff:0,monthOff:0};

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function R(){
  // Lock check
  if(S.data.pin&&sessionStorage.getItem('rotina_unlocked')!=='1'){rLock();return}

  const root=document.getElementById('root');
  const t=td(),now=new Date();
  const dl=now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const items=S.data.items||[];
  const active=items.filter(i=>!i.archived);
  const tags=allTags(active);
  const fi=S.tagF?active.filter(i=>(i.tags||[]).includes(S.tagF)):active;
  const sorted=sortedItems(fi);

  // Tab title counter
  const dueToday=active.filter(i=>isDue(i,t));
  const pendToday=dueToday.filter(i=>!i.checks?.includes(t)&&!i.skips?.includes(t)).length;
  document.title=pendToday>0?`(${pendToday}) Rotina`:'◉ Rotina';

  let h=`<div class="app"><div class="hdr"><div><h1>◉ rotina</h1><div class="hdr-sub">${dl}</div></div>
  <div class="hdr-r"><button class="btn-s" onclick="csv()">csv</button><button class="btn-s" onclick="exportJSON()">backup</button><button class="btn-s" onclick="document.getElementById('imp-file').click()">restore</button><input type="file" id="imp-file" accept=".json" style="display:none" onchange="importJSON(this)">${S.data.pin?`<button class="btn-s" onclick="lockApp()" title="Trancar">🔒</button>`:`<button class="btn-s" onclick="setupPin()" title="Criar PIN">🔓</button>`}<button class="btn-s btn-g" onclick="oA()">+ novo</button></div></div>
  <div class="tabs">
    <button class="tab ${S.view==='today'?'on':''}" onclick="V('today')">hoje</button>
    <button class="tab ${S.view==='inbox'?'on':''}" onclick="V('inbox')">inbox</button>
    <button class="tab ${S.view==='week'?'on':''}" onclick="V('week')">semana</button>
    <button class="tab ${S.view==='month'?'on':''}" onclick="V('month')">mês</button>
    <button class="tab ${S.view==='heat'?'on':''}" onclick="V('heat')">heatmap</button>
    <button class="tab ${S.view==='streaks'?'on':''}" onclick="V('streaks')">streaks</button>
    <button class="tab ${S.view==='all'?'on':''}" onclick="V('all')">todos</button>
  </div>`;

  if(tags.length){
    h+=`<div class="tbar"><button class="tch ${!S.tagF?'on':''}" onclick="TF(null)" style="color:${!S.tagF?'var(--g)':'var(--t3)'}">todos</button>`;
    tags.forEach(t=>{const c=getTagColor(t);h+=`<button class="tch ${S.tagF===t?'on':''}" onclick="TF('${esc(t)}')" style="${S.tagF===t?`border-color:${c};color:${c};background:${c}22`:`color:${c}`}">${esc(t)}</button>`});
    h+=`</div>`;
  }

  if(S.view==='today')h+=rToday(t,sorted);
  else if(S.view==='inbox')h+=rInbox();
  else if(S.view==='week')h+=rWeek(t,sorted);
  else if(S.view==='month')h+=rMonth(t,sorted);
  else if(S.view==='heat')h+=rHeat(sorted);
  else if(S.view==='streaks')h+=rStreaks(sorted);
  else h+=rAll(sorted, sortedItems((S.tagF?items.filter(i=>(i.tags||[]).includes(S.tagF)):items).filter(i=>i.archived)));

  h+=`</div>`;
  root.innerHTML=h;
  if(S.modal)rMod();
}

// ─── MILESTONES ─────────────────────────────────────────────
const MILESTONES=[
  {d:7,icon:'⭐',title:'1 semana!'},
  {d:14,icon:'🌟',title:'2 semanas!'},
  {d:21,icon:'💫',title:'3 semanas!'},
  {d:30,icon:'🏆',title:'1 mês!'},
  {d:60,icon:'🔥',title:'2 meses!'},
  {d:90,icon:'💎',title:'3 meses!'},
  {d:180,icon:'👑',title:'6 meses!'},
  {d:365,icon:'🏅',title:'1 ANO!'},
];

function checkMilestone(it){
  const s=streak(it);
  const ms=MILESTONES.find(m=>m.d===s);
  if(!ms)return;
  // Check if already shown
  const key=`ms_${it.id}_${ms.d}`;
  if(!S.data.milestones)S.data.milestones={};
  if(S.data.milestones[key])return;
  S.data.milestones[key]=td();
  push(S.data);
  showMilestone(ms,it);
}

function showMilestone(ms,it){
  // Confetti first
  confetti({getBoundingClientRect:()=>({left:window.innerWidth/2-10,top:window.innerHeight/2-60,width:20})});
  setTimeout(()=>confetti({getBoundingClientRect:()=>({left:window.innerWidth/2-10,top:window.innerHeight/2-60,width:20})}),200);

  const el=document.createElement('div');
  el.className='milestone-overlay';
  el.innerHTML=`<div class="milestone-card">
    <div class="ms-icon">${ms.icon}</div>
    <div class="ms-title">${ms.title}</div>
    <div class="ms-sub"><span class="ms-name">${esc(it.name)}</span><br>${ms.d} dias seguidos!</div>
    <button class="ms-dismiss" onclick="this.closest('.milestone-overlay').remove()">massa!</button>
  </div>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),8000);
}

// ─── TODAY ──────────────────────────────────────────────────
function rToday(t,items){
  if(!items.length)return`<div class="empty"><p>Nenhum item ainda.</p><button class="btn bp" onclick="oA()">+ novo</button></div>`;
  const due=items.filter(i=>isDue(i,t));
  if(!due.length)return`<div class="empty"><p>Dia livre — nada agendado 🎉</p></div>`;

  // Period filter
  const periods=[
    {k:null,lbl:'tudo',icon:''},
    {k:'morning',lbl:'manhã',icon:'☀'},
    {k:'afternoon',lbl:'tarde',icon:'⛅'},
    {k:'evening',lbl:'noite',icon:'🌙'},
    {k:'anytime',lbl:'qualquer',icon:'∞'},
  ];
  const pf=S.periodF;
  const filtered=pf?due.filter(i=>(i.period||'anytime')===pf):due;

  const skipped=filtered.filter(i=>i.skips?.includes(t));
  const pen=filtered.filter(i=>!i.checks?.includes(t)&&!i.skips?.includes(t));
  const don=filtered.filter(i=>i.checks?.includes(t));
  const total=filtered.length-skipped.length;
  const pct=total?Math.round(don.length/total*100):0;

  let h=`<div class="period-bar">`;
  periods.forEach(p=>{
    const count=p.k?due.filter(i=>(i.period||'anytime')===p.k).length:due.length;
    if(p.k&&count===0)return;
    h+=`<button class="period-chip ${pf===p.k?'on':''}" onclick="PF(${p.k?`'${p.k}'`:'null'})">${p.icon?`<span class="period-icon">${p.icon}</span>`:''}${p.lbl}</button>`;
  });
  h+=`</div>`;

  h+=`<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-lbl">${don.length}/${total} · ${pct}%${skipped.length?` · ${skipped.length} pulado`:''}</div></div>`;

  // Group by period when not filtering
  if(!pf){
    const groups=[
      {k:'morning',lbl:'☀ manhã',items:[]},
      {k:'afternoon',lbl:'⛅ tarde',items:[]},
      {k:'evening',lbl:'🌙 noite',items:[]},
      {k:'anytime',lbl:'qualquer hora',items:[]},
    ];
    pen.forEach(i=>{const g=groups.find(g=>g.k===(i.period||'anytime'));if(g)g.items.push(i)});

    const hasMultiple=groups.filter(g=>g.items.length).length>1;

    groups.forEach(g=>{
      if(!g.items.length)return;
      if(hasMultiple)h+=`<div class="slbl">${g.lbl} · ${g.items.length}</div>`;
      else h+=`<div class="slbl">pendente · ${g.items.length}</div>`;
      g.items.forEach(i=>{h+=iHTML(i,t,false)});
    });
  }else{
    if(pen.length){
      h+=`<div class="slbl">pendente · ${pen.length}</div>`;
      pen.forEach(i=>{h+=iHTML(i,t,false)});
    }
  }

  if(don.length){
    h+=`<div class="slbl">concluído · ${don.length}</div>`;
    don.forEach(i=>{h+=iHTML(i,t,true)});
  }

  // Today's todos + overdue
  const todos=S.data.todos||[];
  const todayTodos=todos.filter(x=>!x.done&&(x.due===t||(x.due&&x.due<t)));
  if(todayTodos.length){
    h+=`<div class="slbl">tarefas${todayTodos.some(x=>x.due<t)?' · ⚠ atrasadas':''}</div>`;
    todayTodos.forEach(todo=>{
      const overdue=todo.due&&todo.due<t;
      h+=`<div class="todo-it">
        <div class="ck" onclick="togTodo('${todo.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <div style="flex:1;min-width:0"><div class="todo-text">${esc(todo.text)}</div>
        ${overdue?`<div class="todo-due overdue">atrasado · ${todo.due}</div>`:''}</div>
      </div>`;
    });
  }

  return h;
}

function iHTML(it,t,dn){
  const s=streak(it);
  const tg=(it.tags||[]).map(t=>tagHTML(t)).join('');
  const time=it.time?`<span class="itime">${it.time}</span>`:'';
  const periodIcons={morning:'☀',afternoon:'⛅',evening:'🌙'};
  const pIcon=periodIcons[it.period]?`<span class="period-badge">${periodIcons[it.period]}</span>`:'';
  const skipped=it.skips?.includes(t);

  // Mini strip: last 5 due dates before today + today
  const now=new Date();
  const stripDays=[];
  let found=0;
  for(let i=1;i<=60&&found<5;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=$d(d.getFullYear(),d.getMonth(),d.getDate());
    if(isDue(it,ds)){stripDays.unshift(ds);found++}
  }

  let strip=`<div class="mini-strip">`;
  stripDays.forEach(d=>{
    const done=it.checks?.includes(d);
    const skip=it.skips?.includes(d);
    const dt=new Date(d+'T12:00:00');
    const lbl=dt.getDate();
    let cls='ms-cell';
    if(skip)cls+=' ms-skip';
    else if(done)cls+=' ms-on';
    strip+=`<div class="ms-day"><div class="${cls}" onclick="tog('${it.id}','${d}',event)" title="${d}"></div><div class="ms-lbl">${lbl}</div></div>`;
  });
  strip+=`</div>`;

  // 30-day completion rate
  let due30=0,done30=0;
  for(let i=0;i<30;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=$d(d.getFullYear(),d.getMonth(),d.getDate());
    if(isDue(it,ds)){due30++;if(it.checks?.includes(ds))done30++}
  }
  const rate=due30?Math.round(done30/due30*100):0;

  return`<div class="it ${dn?'dn':''}">
    <div class="ck" onclick="tog('${it.id}','${t}',event)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg></div>
    <div class="ii">
      <div class="iname">${pIcon}${time}${esc(it.name)}<span class="rate-pct">${rate}%</span></div>
      <div class="im"><span>${schedLbl(it)}</span>${tg}
        <button class="skip-btn ${skipped?'on':''}" onclick="event.stopPropagation();togSkip('${it.id}','${t}')" title="Pular (não quebra streak)">${skipped?'pulado':'pular'}</button>
      </div>
      ${strip}
    </div>
    ${s>0?`<span class="sk">🔥${s}</span>`:''}

// ─── WEEK VIEW ──────────────────────────────────────────────
function rWeek(t,items){
  if(!items.length)return`<div class="empty"><p>Nenhum item ainda.</p><button class="btn bp" onclick="oA()">+ novo</button></div>`;

  const off=S.weekOff||0;
  const now=new Date();
  // Get Monday of current week, then offset
  const monday=new Date(now);
  const dow=monday.getDay();
  monday.setDate(monday.getDate()-(dow===0?6:dow-1)+off*7);

  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(d.getDate()+i);
    days.push({date:$d(d.getFullYear(),d.getMonth(),d.getDate()),dow:d.getDay(),d:d.getDate(),month:MN[d.getMonth()]});
  }

  const monLabel=days[0].month!==days[6].month
    ?`${days[0].d} ${days[0].month} — ${days[6].d} ${days[6].month}`
    :`${days[0].d} — ${days[6].d} ${days[0].month}`;

  let h=`<div class="wk-nav">
    <button class="wk-nav-btn" onclick="S.weekOff=(S.weekOff||0)-1;R()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="wk-nav-lbl">${monLabel}${off===0?' · esta semana':''}</div>
    <button class="wk-nav-btn" onclick="if((S.weekOff||0)<0){S.weekOff=(S.weekOff||0)+1;R()}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>`;

  h+=`<div class="wk-grid">`;
  // Header row
  h+=`<div class="wk-corner"></div>`;
  days.forEach(d=>{
    const isToday=d.date===t;
    h+=`<div class="wk-hdr ${isToday?'wk-today':''}">${DL[d.dow]}<br>${d.d}</div>`;
  });

  // Item rows
  items.forEach(it=>{
    h+=`<div class="wk-name">${esc(it.name)}</div>`;
    days.forEach(d=>{
      const due=isDue(it,d.date);
      const done=it.checks?.includes(d.date);
      const skip=it.skips?.includes(d.date);
      if(!due){
        h+=`<div class="wk-cell wk-na"><div class="wk-dot" style="opacity:0"></div></div>`;
      }else{
        const cls=done?'wk-done':skip?'wk-skip':'';
        h+=`<div class="wk-cell ${cls}" onclick="tog('${it.id}','${d.date}',event)"><div class="wk-dot"></div></div>`;
      }
    });
  });

  h+=`</div>`;

  // Week summary
  let totalDue=0,totalDone=0;
  days.forEach(d=>{
    items.forEach(it=>{
      if(isDue(it,d.date)){totalDue++;if(it.checks?.includes(d.date))totalDone++}
    });
  });
  const pct=totalDue?Math.round(totalDone/totalDue*100):0;
  h+=`<div style="font-family:var(--mono);font-size:.6rem;color:var(--t3);text-align:right;margin-top:8px">${totalDone}/${totalDue} concluídos · ${pct}%</div>`;

  return h;
}

// ─── MONTH VIEW ─────────────────────────────────────────────
function rMonth(t,items){
  if(!items.length)return`<div class="empty"><p>Nenhum item ainda.</p><button class="btn bp" onclick="oA()">+ novo</button></div>`;

  const off=S.monthOff||0;
  const now=new Date();
  const year=now.getFullYear()+Math.floor((now.getMonth()+off)/12);
  const month=((now.getMonth()+off)%12+12)%12;
  const dim=new Date(year,month+1,0).getDate();
  const startDow=new Date(year,month,1).getDay();
  const startOff=startDow===0?6:startDow-1; // monday=0

  const MNF=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

  let h=`<div class="wk-nav">
    <button class="wk-nav-btn" onclick="S.monthOff=(S.monthOff||0)-1;R()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="wk-nav-lbl">${MNF[month]} ${year}</div>
    <button class="wk-nav-btn" onclick="if((S.monthOff||0)<0){S.monthOff=(S.monthOff||0)+1;R()}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>`;

  items.forEach(it=>{
    const s=streak(it);
    // Count month stats
    let mDue=0,mDone=0;
    for(let d=1;d<=dim;d++){const ds=$d(year,month,d);if(isDue(it,ds)){mDue++;if(it.checks?.includes(ds))mDone++}}
    const pct=mDue?Math.round(mDone/mDue*100):0;

    h+=`<div class="mo-card">
      <div class="loop-hdr" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="loop-name">${esc(it.name)}</span>
          ${s>0?`<span class="sk" style="font-size:.58rem">🔥${s}</span>`:''}
        </div>
        <span style="font-family:var(--mono);font-size:.58rem;color:var(--t3)">${mDone}/${mDue} · ${pct}%</span>
      </div>
      <div class="mo-cal">
        <div class="mo-cal-hdr">S</div><div class="mo-cal-hdr">T</div><div class="mo-cal-hdr">Q</div><div class="mo-cal-hdr">Q</div><div class="mo-cal-hdr">S</div><div class="mo-cal-hdr">S</div><div class="mo-cal-hdr">D</div>`;

    // Empty cells before first day
    for(let i=0;i<startOff;i++)h+=`<div class="mo-cal-cell mo-empty"></div>`;

    for(let d=1;d<=dim;d++){
      const ds=$d(year,month,d);
      const due=isDue(it,ds);
      const done=it.checks?.includes(ds);
      const skip=it.skips?.includes(ds);
      const isT=ds===t;

      if(!due){
        h+=`<div class="mo-cal-cell mo-na"><span class="mo-num">${d}</span></div>`;
      }else{
        const cls=done?'mo-done':skip?'mo-skip':'';
        h+=`<div class="mo-cal-cell ${cls} ${isT?'mo-today':''}" onclick="tog('${it.id}','${ds}',event)">
          <span class="mo-num">${d}</span>
          <div class="mo-cdot"></div>
        </div>`;
      }
    }

    h+=`</div></div>`;
  });

  return h;
}

// ─── CONFETTI ───────────────────────────────────────────────
function confetti(el){
  const rect=el?el.getBoundingClientRect():{left:window.innerWidth/2,top:window.innerHeight/2};
  const container=document.createElement('div');
  container.className='confetti-container';
  document.body.appendChild(container);

  const colors=['#4ADE80','#FBBF24','#60A5FA','#F87171','#C084FC','#F472B6','#FB923C','#2DD4BF'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div');
    p.className='confetti';
    const angle=Math.random()*Math.PI*2;
    const dist=60+Math.random()*80;
    const cx=Math.cos(angle)*dist;
    const cy=Math.sin(angle)*dist-40;
    p.style.cssText=`
      left:${rect.left+rect.width/2}px;top:${rect.top}px;
      background:${colors[i%colors.length]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;
      --cx:${cx}px;--cy:${cy}px;--cr:${Math.random()*720-360}deg;
      animation-delay:${Math.random()*0.15}s;
      animation-duration:${0.6+Math.random()*0.5}s;
    `;
    container.appendChild(p);
  }
  setTimeout(()=>container.remove(),1500);
}

// ─── HEATMAP (git-style) ────────────────────────────────────
function rHeat(items){
  if(!items.length)return`<div class="empty"><p>Adicione itens pra ver o heatmap.</p></div>`;
  const W=26,now=new Date(),tdow=now.getDay(),start=new Date(now);
  start.setDate(start.getDate()-tdow-(W-1)*7);

  const hmItems=S.heatItem==='all'?items:items.filter(i=>i.id===S.heatItem);

  let h=`<div class="hw"><div class="ht-row"><div class="ht">últimos 6 meses</div>
  <select class="hm-select" onchange="S.heatItem=this.value;R()">
    <option value="all" ${S.heatItem==='all'?'selected':''}>todos os itens</option>`;
  items.forEach(i=>{h+=`<option value="${i.id}" ${S.heatItem===i.id?'selected':''}>${esc(i.name)}</option>`});
  h+=`</select></div>`;

  h+=`<div style="display:flex;gap:3px;margin-bottom:4px">`;
  let lm=-1;
  for(let w=0;w<W;w++){const d=new Date(start);d.setDate(d.getDate()+w*7);const m=d.getMonth();if(m!==lm){h+=`<div style="width:13px;font-family:var(--mono);font-size:.48rem;color:var(--t3)">${MN[m]}</div>`;lm=m}else h+=`<div style="width:13px"></div>`}
  h+=`</div><div class="hm">`;

  for(let w=0;w<W;w++){h+=`<div class="hc">`;
    for(let d=0;d<7;d++){
      const dt=new Date(start);dt.setDate(dt.getDate()+w*7+d);
      if(dt>now){h+=`<div class="hx"></div>`;continue}
      const ds=$d(dt.getFullYear(),dt.getMonth(),dt.getDate());
      const due=hmItems.filter(i=>isDue(i,ds));
      const done=due.filter(i=>i.checks?.includes(ds)).length;
      const tot=due.length;
      let r=0;if(tot>0){const rt=done/tot;if(rt>0&&rt<.5)r=1;else if(rt>=.5&&rt<1)r=2;else if(rt===1&&tot<=2)r=3;else if(rt===1)r=4}
      h+=`<div class="hx" data-r="${r}" title="${ds}: ${done}/${tot}"></div>`;
    }
  h+=`</div>`}
  h+=`</div><div class="hl"><span>menos</span><div class="hlc" style="background:var(--s2)"></div><div class="hlc" style="background:#152e1d"></div><div class="hlc" style="background:#1a5c30"></div><div class="hlc" style="background:#27864a"></div><div class="hlc" style="background:#4ADE80"></div><span>mais</span></div></div>`;
  return h;
}

// ─── STREAKS ────────────────────────────────────────────────
function rStreaks(items){
  if(!items.length)return`<div class="empty"><p>Adicione itens pra ver streaks.</p></div>`;

  let h=`<div class="slbl">streaks</div>`+[...items].sort((a,b)=>streak(b)-streak(a)).map(it=>{
    const s=streak(it),b=bestStreak(it);
    return`<div class="sr">
      <div class="srn">${esc(it.name)}</div>
      <div class="srv">${s>0?'🔥 ':''}${s}d</div>
      <div class="srb">best ${b}d</div>
    </div>`;
  }).join('');

  // Best day of week
  const dayStats=[0,0,0,0,0,0,0]; // due counts per dow
  const dayDone=[0,0,0,0,0,0,0];
  const now=new Date();
  for(let i=0;i<90;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=$d(d.getFullYear(),d.getMonth(),d.getDate());
    const dow=d.getDay();
    items.forEach(it=>{
      if(isDue(it,ds)){dayStats[dow]++;if(it.checks?.includes(ds))dayDone[dow]++}
    });
  }
  const dayPct=dayStats.map((v,i)=>v?Math.round(dayDone[i]/v*100):0);
  const maxPct=Math.max(...dayPct,1);
  const bestDay=dayPct.indexOf(Math.max(...dayPct));
  const labels=['dom','seg','ter','qua','qui','sex','sáb'];

  h+=`<div class="slbl">melhor dia da semana · últimos 90 dias</div>
  <div style="background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:16px">
    <div class="bd-wrap">`;
  for(let i=0;i<7;i++){
    const pct=dayPct[i];
    const barH=maxPct?Math.round(pct/maxPct*100):0;
    const isBest=i===bestDay&&pct>0;
    h+=`<div class="bd-bar-col">
      <div class="bd-bar-pct">${pct}%</div>
      <div class="bd-bar-track"><div class="bd-bar-fill" style="height:${barH}%;background:${isBest?'var(--g)':'var(--s3)'}"></div></div>
      <div class="bd-bar-lbl" style="${isBest?'color:var(--g)':''}">${labels[i]}</div>
    </div>`;
  }
  h+=`</div></div>`;
  return h;
}

    </div>`;
    document.body.appendChild(o);
    window._m={freq:isE?it.freq:'daily',days:isE?[...(it.days||[])]:[],md:isE?(it.monthDay||1):1,period:isE?(it.period||'anytime'):'anytime'};
    rFD();
    initModalTags(isE?(it.tags||[]):[]);

  }else if(S.modal==='delete'){
    const it=S.data.items.find(i=>i.id===S.edit?.id);
    o.innerHTML=`<div class="mo" onclick="event.stopPropagation()">
      <h3>Remover "${esc(it?.name||'')}"?</h3>
      <p style="color:var(--t2);font-size:.82rem;margin-bottom:18px">Todo o histórico será perdido.</p>
      <div class="ma"><button class="btn bs" onclick="cM()">Cancelar</button><button class="btn bd" onclick="xD()">Remover</button></div>
    </div>`;
    document.body.appendChild(o);
  }
}

function rFD(){
  const el=document.getElementById('mfd');if(!el)return;const m=window._m;
  if(m.freq==='weekly'){
    el.innerHTML=`<div class="dp">${DL.map((l,i)=>`<button class="db ${m.days.includes(i)?'on':''}" onclick="TD(${i})">${l}</button>`).join('')}</div>`;
  }else if(m.freq==='monthly'){
    el.innerHTML=`<div style="margin-top:8px"><span class="fl" style="display:inline">dia do mês:</span> <input type="number" class="mdi" min="1" max="31" value="${m.md}" onchange="window._m.md=+this.value"></div>`;

}

// Track selected tags in modal
window._mTags=[];
window._mNewColor=null;

window.initModalTags=function(tags){
  window._mTags=[...(tags||[])];
  window._mNewColor=null;
  renderSelTags();
  updateTagSug();
};

window.renderSelTags=function(){
  const el=document.getElementById('tsel');if(!el)return;
  if(!_mTags.length){el.innerHTML='';return}
  el.innerHTML=_mTags.map(t=>{
    const c=getTagColor(t);
    return`<span class="tag-pill" style="background:${c}22;color:${c};border-color:${c}44">
      ${esc(t)}
      <span class="tag-x" onclick="removeModalTag('${esc(t)}')">×</span>
      <span class="tag-cdot" style="background:${c}" onclick="showColorPicker('${esc(t)}')" title="Mudar cor"></span>
    </span>`;
  }).join('');
};

window.updateTagSug=function(){
  const el=document.getElementById('tsug');if(!el)return;
  const input=document.getElementById('mt');if(!input)return;
  const q=input.value.trim().toLowerCase();
  const all=allTags(S.data.items).filter(t=>!_mTags.includes(t));
  const filtered=q?all.filter(t=>t.includes(q)):all;
  if(!filtered.length){el.innerHTML='';return}
  el.innerHTML=filtered.map(t=>{
    const c=getTagColor(t);
    return`<button class="tag-sug" style="background:${c}22;color:${c};border-color:${c}44" onclick="addExistingTag('${esc(t)}')">${esc(t)}</button>`;
  }).join('');
};

window.addExistingTag=function(tag){
  if(!_mTags.includes(tag)){_mTags.push(tag)}
  const input=document.getElementById('mt');if(input)input.value='';
  renderSelTags();updateTagSug();hideColorPicker();
};

window.addNewTag=function(){
  const input=document.getElementById('mt');if(!input)return;
  const tag=input.value.trim().toLowerCase();if(!tag||_mTags.includes(tag))return;
  // Set color if one was picked
  if(_mNewColor){
    if(!S.data.tagColors)S.data.tagColors={};
    S.data.tagColors[tag]=_mNewColor;
  }
  _mTags.push(tag);
  getTagColor(tag); // ensure color exists
  input.value='';_mNewColor=null;
  renderSelTags();updateTagSug();hideColorPicker();
};

window.removeModalTag=function(tag){
  _mTags=_mTags.filter(t=>t!==tag);
  renderSelTags();updateTagSug();
};

window.showColorPicker=function(tag){
  const el=document.getElementById('tcol');if(!el)return;
  el.style.display='flex';
  el.dataset.tag=tag;
  const current=getTagColor(tag);
  el.innerHTML=TAG_COLORS.map(c=>
    `<div class="tag-color-dot ${c===current?'on':''}" style="background:${c}" onclick="pickColor('${tag}','${c}')"></div>`
  ).join('');
};

window.hideColorPicker=function(){
  const el=document.getElementById('tcol');if(el)el.style.display='none';
};

window.pickColor=function(tag,color){
  if(!S.data.tagColors)S.data.tagColors={};
  S.data.tagColors[tag]=color;
  if(!_mTags.includes(tag)){_mNewColor=color}
  renderSelTags();hideColorPicker();
};

window.sM=function(){
  const name=document.getElementById('mn')?.value.trim();if(!name)return;
  const m=window._m;
  if(m.freq==='weekly'&&!m.days.length)return;
  const tagsRaw=document.getElementById('mt')?.value.trim().toLowerCase();
  if(tagsRaw&&!_mTags.includes(tagsRaw)){_mTags.push(tagsRaw);getTagColor(tagsRaw)}
  const tags=[..._mTags];
  const time=document.getElementById('mtime')?.value||'';
  const reminder=document.getElementById('mrem')?.classList.contains('on')||false;

  if(S.modal==='add'){
    // Determine order: put at end
    const maxOrder=Math.max(0,...(S.data.items||[]).map(i=>i.order||0));
    S.data.items.push({
      id:uid(),name,freq:m.freq,
      days:m.freq==='weekly'?m.days:undefined,
      monthDay:m.freq==='monthly'?(m.md||1):undefined,
      period:m.period!=='anytime'?m.period:undefined,
      tags:tags.length?tags:undefined,
      time:time||undefined,
      reminder:reminder||undefined,
      order:maxOrder+1,
      checks:[],created:td()
    });
  }else{
    const it=S.data.items.find(i=>i.id===S.edit.id);
    if(it){
      it.name=name;it.freq=m.freq;
      it.days=m.freq==='weekly'?m.days:undefined;
      it.monthDay=m.freq==='monthly'?(m.md||1):undefined;
      it.period=m.period!=='anytime'?m.period:undefined;
      it.tags=tags.length?tags:undefined;
      it.time=time||undefined;
      it.reminder=reminder||undefined;
    }
  }
  push(S.data);cM();R();
  if(reminder)requestNotifPerm();
};

window.xD=function(){
  S.data.items=S.data.items.filter(i=>i.id!==S.edit.id);

};

// Reorder
// Drag and drop reorder
let dragId=null;
let dragFromHandle=false;

document.addEventListener('mousedown',function(e){
  dragFromHandle=!!e.target.closest('.drag-handle');
});

document.addEventListener('dragstart',function(e){
  const it=e.target.closest('.it[data-id]');
  if(!it||!dragFromHandle){e.preventDefault();return}
  dragId=it.dataset.id;
  it.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',dragId);
});

document.addEventListener('dragover',function(e){
  const it=e.target.closest('.it[data-id]');
  if(!it||!dragId||it.dataset.id===dragId)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.it.drag-over').forEach(el=>el.classList.remove('drag-over'));
  it.classList.add('drag-over');
});

document.addEventListener('dragleave',function(e){
  const it=e.target.closest('.it[data-id]');
  if(it)it.classList.remove('drag-over');
});

document.addEventListener('drop',function(e){
  e.preventDefault();
  document.querySelectorAll('.it.drag-over,.it.dragging').forEach(el=>{el.classList.remove('drag-over');el.classList.remove('dragging')});
  const it=e.target.closest('.it[data-id]');
  if(!it||!dragId||it.dataset.id===dragId){dragId=null;return}
  reorderItem(dragId,it.dataset.id);
  dragId=null;
});

document.addEventListener('dragend',function(){
  document.querySelectorAll('.it.drag-over,.it.dragging').forEach(el=>{el.classList.remove('drag-over');el.classList.remove('dragging')});
  dragId=null;
});

// Touch drag support
let touchDragEl=null,touchDragId=null,touchClone=null,touchStartY=0;

document.addEventListener('touchstart',function(e){
  const handle=e.target.closest('.drag-handle');
  if(!handle)return;
  const it=handle.closest('.it[data-id]');
  if(!it)return;
  touchDragId=it.dataset.id;
  touchDragEl=it;
  touchStartY=e.touches[0].clientY;
  // Long press to start drag
  touchDragEl._touchTimer=setTimeout(()=>{
    it.classList.add('dragging');
    touchClone=it.cloneNode(true);
    touchClone.style.cssText='position:fixed;left:16px;right:16px;z-index:300;opacity:.8;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:scale(1.02);';
    touchClone.style.top=e.touches[0].clientY-24+'px';
    document.body.appendChild(touchClone);
  },150);
},{passive:true});

document.addEventListener('touchmove',function(e){
  if(!touchClone)return;
  e.preventDefault();
  touchClone.style.top=e.touches[0].clientY-24+'px';
  document.querySelectorAll('.it.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  const target=el?.closest('.it[data-id]');
  if(target&&target.dataset.id!==touchDragId)target.classList.add('drag-over');
},{passive:false});

document.addEventListener('touchend',function(e){
  if(touchDragEl?._touchTimer)clearTimeout(touchDragEl._touchTimer);
  if(!touchClone){touchDragEl=null;touchDragId=null;return}
  touchClone.remove();touchClone=null;
  document.querySelectorAll('.it.drag-over,.it.dragging').forEach(el=>{el.classList.remove('drag-over');el.classList.remove('dragging')});
  const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  const target=el?.closest('.it[data-id]');
  if(target&&target.dataset.id!==touchDragId){
    reorderItem(touchDragId,target.dataset.id);
  }
  touchDragEl=null;touchDragId=null;
});

function reorderItem(fromId,toId){
  normalizeOrders();
  const items=sortedItems(S.data.items.filter(i=>!i.archived));
  const fromIdx=items.findIndex(i=>i.id===fromId);
  const toIdx=items.findIndex(i=>i.id===toId);
  if(fromIdx<0||toIdx<0)return;
  // Remove from old position, insert at new
  const [moved]=items.splice(fromIdx,1);
  items.splice(toIdx,0,moved);
  items.forEach((it,i)=>{it.order=i});
  push(S.data);R();
}
function normalizeOrders(){
  const items=sortedItems(S.data.items.filter(i=>!i.archived));
  items.forEach((it,i)=>{it.order=i});
}

// LOCK SCREEN
// ═══════════════════════════════════════════════════════════
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return'h'+h}

let lockInput='';
let lockMode='unlock'; // unlock | create | confirm
let lockFirst='';
let lockError=false;

function rLock(){
  const hasPin=S.data.pin;
  const title={create:'Criar PIN',confirm:'Confirmar PIN',unlock:'◉'}[lockMode];
  const sub={create:'Escolha um PIN de 4 dígitos',confirm:'Digite novamente pra confirmar',unlock:''}[lockMode];
  const dots=[0,1,2,3].map(i=>`<div class="lock-dot ${i<lockInput.length?'filled':''} ${lockError?'wrong':''}"></div>`).join('');
  const keys=['1','2','3','4','5','6','7','8','9','','0','⌫'];

  let h=`<div class="lock"><h1>${title}</h1><p>${sub}</p><div class="lock-dots">${dots}</div><div class="lock-pad">`;
  keys.forEach(k=>{
    if(k==='')h+=`<div class="lock-key empty"></div>`;
    else if(k==='⌫')h+=`<button class="lock-key" onclick="lockDel()">⌫</button>`;
    else h+=`<button class="lock-key" onclick="lockKey('${k}')">${k}</button>`;
  });
  h+=`</div>`;
  if(hasPin)h+=`<button class="lock-sub" onclick="removePinPrompt()">remover pin</button>`;
  h+=`</div>`;
  document.getElementById('root').innerHTML=h;
}

// Keyboard support for lock screen
document.addEventListener('keydown',function(e){
  // Only handle when lock screen is showing
  if(!document.querySelector('.lock'))return;
  if(e.key>='0'&&e.key<='9'){lockKey(e.key);e.preventDefault()}
  else if(e.key==='Backspace'){lockDel();e.preventDefault()}
});

window.lockKey=function(k){
  if(lockInput.length>=4)return;
  lockError=false;
  lockInput+=k;
  rLock();
  if(lockInput.length===4)setTimeout(checkLock,200);
};

window.lockDel=function(){
  lockInput=lockInput.slice(0,-1);lockError=false;rLock();
};

function checkLock(){
  if(lockMode==='create'){
    lockFirst=lockInput;lockInput='';lockMode='confirm';rLock();
  }else if(lockMode==='confirm'){
    if(lockInput===lockFirst){
      S.data.pin=simpleHash(lockInput);
      push(S.data);
      sessionStorage.setItem('rotina_unlocked','1');
      lockInput='';R();
    }else{
      lockError=true;lockInput='';lockMode='create';lockFirst='';rLock();
    }
  }else{
    if(simpleHash(lockInput)===S.data.pin){
      sessionStorage.setItem('rotina_unlocked','1');
      lockInput='';R();
    }else{
      lockError=true;lockInput='';rLock();
    }
  }
}

window.removePinPrompt=function(){
  lockMode='unlock';
  const pin=prompt('Digite o PIN atual pra remover:');
  if(pin&&simpleHash(pin)===S.data.pin){
    delete S.data.pin;push(S.data);
    sessionStorage.setItem('rotina_unlocked','1');
    R();
  }else if(pin){
    alert('PIN incorreto.');
  }
};

window.lockApp=function(){
  sessionStorage.removeItem('rotina_unlocked');
  lockInput='';lockMode='unlock';lockError=false;
  rLock();
};

window.setupPin=function(){
  lockInput='';lockMode='create';lockFirst='';lockError=false;
  rLock();
};

      const CACHE='rotina-v1';
      const URLS=[self.location.href];
      self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)).then(()=>self.skipWaiting())));
      self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
      self.addEventListener('fetch',e=>{
        e.respondWith(fetch(e.request).then(r=>{if(r.ok){const c=r.clone();caches.open(CACHE).then(ca=>ca.put(e.request,c))}return r}).catch(()=>caches.match(e.request)))
      });
    `;
    const blob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
})();
